</body>
<!-- PLANES -->
  <section class="planes-grid">
    <!-- tus tarjetas -->
  </section>

  <!-- JS (AQUÍ VA) -->
  <<script>
  const estados = ["soñado", "planeado", "cumplido"];
  const textos = ["Soñado", "Planeado", "Cumplido"];

  // Cargar estados guardados al iniciar
  document.querySelectorAll(".plan-card").forEach(card => {
    const id = card.dataset.id;
    const estadoGuardado = localStorage.getItem("plan-" + id);

    if (estadoGuardado && estados.includes(estadoGuardado)) {
      estados.forEach(e => card.classList.remove(e));
      card.classList.add(estadoGuardado);

      const btn = card.querySelector(".estado-btn");
      btn.textContent = textos[estados.indexOf(estadoGuardado)];
    }
  });

  // Cambiar estado y GUARDARLO
  document.querySelectorAll(".estado-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();

      const card = btn.closest(".plan-card");
      const id = card.dataset.id;

      let actual = estados.findIndex(e => card.classList.contains(e));
      card.classList.remove(estados[actual]);

      let nuevo = (actual + 1) % estados.length;
      card.classList.add(estados[nuevo]);
      btn.textContent = textos[nuevo];

      // Guardar en localStorage
      localStorage.setItem("plan-" + id, estados[nuevo]);
    });
  });

  // Abrir / cerrar con slide
  document.querySelectorAll(".plan-header").forEach(header => {
    header.addEventListener("click", () => {
      header.parentElement.classList.toggle("abierto");
    });
  });
</script>

</body>
